<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prelim Grade Calculator</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="toggle">
  <span>🌙</span>
  <label class="switch">
    <input type="checkbox" onclick="toggleDark()">
    <span class="slider"></span>
  </label>
</div>

<div class="container">
  <h1>Prelim Exam Calculator</h1>
  <p>Enter your Class Standing data below</p>

  <div class="card">
    <div class="inputs">
      <input type="number" id="attendance" placeholder="Attendance (0–100)" min="0" max="100">
      <input type="number" id="lab1" placeholder="Lab Work 1 (0–100)" min="0" max="100">
      <input type="number" id="lab2" placeholder="Lab Work 2 (0–100)" min="0" max="100">
      <input type="number" id="lab3" placeholder="Lab Work 3 (0–100)" min="0" max="100">
    </div>

    <button onclick="calculate()">Calculate</button>

    <div class="results" id="results"></div>
  </div>
</div>

<script src="prelim.js"></script>
</body>
</html>
